{% extends "base.html" %}
{% block content %}
<section class="page-hero">
    <div class="page-hero-content">
        <h1>Order Management</h1>
        <p>CRUD API dengan FastAPI — RESTful Order Service</p>
    </div>
</section>

<section class="section">
    <div class="orders-controls">
        <button class="btn btn-primary" id="addOrderBtn">
            <i class="fas fa-plus"></i> Tambah Order
        </button>
        <div class="orders-search">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari customer...">
        </div>
    </div>
    <div class="orders-table-container">
        <table class="orders-table" id="ordersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                <tr><td colspan="7" class="loading-row"><i class="fas fa-spinner fa-spin"></i> Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</section>

<!-- Modal -->
<div class="modal-overlay" id="orderModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Tambah Order</h3>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <form id="orderForm">
            <input type="hidden" id="orderId">
            <div class="form-group">
                <label>Nama Customer</label>
                <input type="text" id="customerName" required placeholder="Masukkan nama...">
            </div>
            <div class="form-group">
                <label>Nama Item</label>
                <input type="text" id="itemName" required placeholder="Masukkan item...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" required min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="price" required min="0" step="0.01" placeholder="0.00">
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-outline" id="modalCancel">Batal</button>
                <button type="submit" class="btn btn-primary" id="modalSubmit">Simpan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = "/api/orders";

// Load orders
async function loadOrders() {
    const res = await fetch(API);
    const orders = await res.json();
    const tbody = document.getElementById("ordersBody");
    tbody.innerHTML = orders.map(o => {
        const total = (o.quantity * o.price).toFixed(2);
        return `<tr>
            <td>${o.order_id}</td>
            <td><span class="customer-badge">${o.customer_name}</span></td>
            <td>${o.item}</td>
            <td>${o.quantity}</td>
            <td>$${o.price.toFixed(2)}</td>
            <td><strong>$${total}</strong></td>
            <td class="actions">
                <button class="btn-icon edit-btn" data-id="${o.order_id}" title="Edit"><i class="fas fa-edit"></i></button>
                <button class="btn-icon delete-btn" data-id="${o.order_id}" title="Hapus"><i class="fas fa-trash"></i></button>
            </td>
        </tr>`;
    }).join("");
}

// Modal logic
const modal = document.getElementById("orderModal");
document.getElementById("addOrderBtn").onclick = () => {
    document.getElementById("modalTitle").textContent = "Tambah Order";
    document.getElementById("orderForm").reset();
    document.getElementById("orderId").value = "";
    modal.classList.add("active");
};
document.getElementById("modalClose").onclick = () => modal.classList.remove("active");
document.getElementById("modalCancel").onclick = () => modal.classList.remove("active");
modal.onclick = (e) => { if(e.target === modal) modal.classList.remove("active"); };

document.getElementById("orderForm").onsubmit = async (e) => {
    e.preventDefault();
    const id = document.getElementById("orderId").value;
    const data = {
        customer_name: document.getElementById("customerName").value,
        item: document.getElementById("itemName").value,
        quantity: parseInt(document.getElementById("quantity").value),
        price: parseFloat(document.getElementById("price").value)
    };
    const url = id ? `${API}/${id}` : API;
    const method = id ? "PUT" : "POST";
    await fetch(url, { method, headers: {"Content-Type": "application/json"}, body: JSON.stringify(data) });
    modal.classList.remove("active");
    loadOrders();
};

document.getElementById("ordersBody").addEventListener("click", async (e) => {
    const btn = e.target.closest("button");
    if(!btn) return;
    const id = btn.dataset.id;
    if(btn.classList.contains("edit-btn")) {
        const res = await fetch(`${API}/${id}`);
        const o = await res.json();
        document.getElementById("modalTitle").textContent = "Edit Order";
        document.getElementById("orderId").value = o.order_id;
        document.getElementById("customerName").value = o.customer_name;
        document.getElementById("itemName").value = o.item;
        document.getElementById("quantity").value = o.quantity;
        document.getElementById("price").value = o.price;
        modal.classList.add("active");
    }
    if(btn.classList.contains("delete-btn")) {
        if(confirm("Hapus order ini?")) {
            await fetch(`${API}/${id}`, { method: "DELETE" });
            loadOrders();
        }
    }
});

// Search
document.getElementById("searchInput").addEventListener("input", function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll("#ordersBody tr").forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(q) ? "" : "none";
    });
});

loadOrders();
</script>
{% endblock %}
